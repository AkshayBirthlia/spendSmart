<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/temp/temp.css" />
  </head>
  <body>
    <div id="left-pannel">
      <div>
        <div class="iconDisplay">
          <img src="assets/img/logo.png" id="logoDisplay" alt="logo" />
          SpendSmart
        </div>

        <div>
          <div class="sideBar-navigation">
            <img src="assets/img/Dashboard.png" class="icon" alt="Dashboard" />
            <h4>Dashboard</h4>
          </div>

          <div class="sideBar-navigation">
            <img
              src="assets/img/transfer.png"
              class="icon"
              alt="Transactions"
            />
            <h4>Transactions</h4>
          </div>
          <div class="sideBar-navigation">
            <img src="assets/img/report.png" class="icon" alt="Reports" />
            <h4>Reports</h4>
          </div>
          <div class="sideBar-navigation">
            <img src="assets/img/budget.png" class="icon" alt="Budgets" />
            <h4>Budgets</h4>
          </div>
        </div>
      </div>

      <div>
        <div class="sideBar-navigation-down">
          <img src="assets/img/settings.png" class="icon" alt="settings" />
          <h4>Settings</h4>
        </div>

        <div class="sideBar-navigation-down">
          <img src="assets/img/user.png" class="icon" alt="user" />
          <div>
            <h3>Akshay Birthlia</h3>
            <h5>Free Plan</h5>
          </div>
        </div>
      </div>
    </div>
    <div id="right-pannel">
      <div id="navBar">
        <div>Dashboard</div>
        <div>
          <img
            src="assets/img/notification.png"
            alt="notification"
            class="icon"
          />
          <input type="datetime-local" />
        </div>
      </div>
      <div id="content">
        <img src="assets/img/koala.png" alt="koala" id="koala" />
        <h3>No expenses yet!</h3>
        <h4>It look like your wallet is taking a break.</h4>
        <h4>Add your first expense to start tracking.</h4>
        <button id="addExpense">+ Add Expense</button>
      </div>
    <div id="addBox">
       <div class="spaceBetween">
          Add Money
          <button id="closeBtn">
            <img src="assets/img/cross.png" alt="x" class="icon" />
          </button>
        </div>
        <div>
          <h4>Amount</h4>
          <div>
            $
            <input type="number" placeholder="0.00">
          </div>


    </div>

    </div>
    <script src="/temp/temp.js"></script>
  </body>
</html>
